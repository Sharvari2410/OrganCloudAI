services:
  - type: web
    name: smart-organ-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
